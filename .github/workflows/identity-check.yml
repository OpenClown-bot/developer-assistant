name: Identity check

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-identities:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history needed so merge-base resolution works against the PR base ref.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate identities
        env:
          GITHUB_BASE_REF: ${{ github.base_ref || github.event.repository.default_branch }}
        run: python scripts/validate_identities.py
